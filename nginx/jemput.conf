# Jemput - Kad Kahwin Digital
# Add this to /etc/nginx/sites-available/ and symlink to sites-enabled

server {
    listen 80;
    server_name jemput.neyobytes.com;

    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name jemput.neyobytes.com;

    # SSL certs - run: sudo certbot --nginx -d jemput.neyobytes.com
    ssl_certificate /etc/letsencrypt/live/jemput.neyobytes.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/jemput.neyobytes.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    root /home/debian/neyobytes-jemput/dist;
    index index.html;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml;
    gzip_min_length 256;

    # Static assets - long cache
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # SPA fallback - all routes serve index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}
